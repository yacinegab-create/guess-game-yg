<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
         <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="guess.css">
        <title>Guessing game</title>
    </head>
<body>
    <div class="g">
        <div class="a">
         <h1>Guessing game</h1>
         <p>Guess a number between 1 and 100</p>
         <div>Attempts left : <span id="attemtsLeft">10</span></div>
        </div>
        <div class="b">
         <input type="number" min="0" max="100" id="guessInput">
         <br>
         <button id="submitButton" onclick="checkGuess()">Submit Guess</button>
         <br>
         <p id="message"></p>
        </div>
    </div>
    <script src="gg.js"></script>
</body>
</html>
